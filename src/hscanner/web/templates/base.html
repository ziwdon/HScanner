<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HScanner{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css?v=8">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/"><span class="pulse" aria-hidden="true"></span>H<b>Scanner</b></a>
      <span class="spacer"></span>
      <a class="navlink {% if active == 'scan' %}active{% endif %}" href="/">Scan</a>
      <a class="navlink {% if active == 'history' %}active{% endif %}" href="/history">History</a>
      <a class="navlink {% if active == 'settings' %}active{% endif %}" href="/settings">Settings</a>
      <span class="tag">localhost · triage, not antivirus</span>
    </header>

    <main class="wrap">{% block content %}{% endblock %}</main>

    <footer class="footer">
      Hashes may be sent to the selected scan engine; file contents leave your
      machine only with your consent. <span class="mono">No detections</span> means the engine found
      nothing, not that the file is safe.
    </footer>
  </body>
</html>
